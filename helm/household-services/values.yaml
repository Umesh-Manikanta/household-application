replicaCount:
  backend: 1
  frontend: 1

backend:
  image:
    repository: werty123321/household-backend
    tag: latest
    pullPolicy: IfNotPresent
  port: 5000
  env:
    FLASK_APP: app.py
    FLASK_ENV: production

frontend:
  image:
    repository: werty123321/household-frontend
    tag: v2
    pullPolicy: IfNotPresent
  port: 80

ingress:
  enabled: true
  host: household.local

postgresql:
  auth:
    username: household_user
    password: household_pass
    database: household_db
  primary:
    persistence:
      enabled: true
      size: 1Gi